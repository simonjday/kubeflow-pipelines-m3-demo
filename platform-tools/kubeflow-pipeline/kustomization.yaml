apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubeflow

resources:
  - github.com/kubeflow/pipelines/manifests/kustomize/env/platform-agnostic-emissary?ref=2.16.1

# Remove cache-deployer — it requires the Kubernetes CSR API, which is unavailable/
# restricted on managed clusters (EKS, OpenShift) and unnecessary on kind since
# cert-manager (installed separately) issues the cache-server's TLS cert instead.
patches:
  - patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cache-deployer-deployment
        namespace: kubeflow

  # Expose the Pipelines UI on NodePort for local access via kind.
  - target:
      kind: Service
      name: ml-pipeline-ui
    patch: |
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080

  # SeaweedFS runs as a non-root user by default and needs explicit write
  # permission on its volume — without this it fails with:
  #   "please verify /data is writable... permission denied"
  - target:
      kind: Deployment
      name: seaweedfs
    patch: |
      - op: add
        path: /spec/template/spec/securityContext
        value:
          fsGroup: 1000
          runAsUser: 1000
          runAsGroup: 1000

  # Drop the default-deny-same-namespace NetworkPolicy so the UI is reachable
  # from outside the namespace in a local/testing context. Do NOT do this in
  # production — use an Ingress + proper NetworkPolicy instead.
  - patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: default-allow-same-namespace
        namespace: kubeflow
