<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="320" fill="#ffffff"/>

  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">What happens when you run `python3 pipeline.py`</text>

  <!-- step boxes -->
  <g font-size="12">
    <rect x="20" y="55" width="150" height="60" rx="6" fill="#f1f5f9" stroke="#64748b"/>
    <text x="95" y="80" text-anchor="middle" font-weight="bold" fill="#0f172a">kfp SDK</text>
    <text x="95" y="98" text-anchor="middle" fill="#475569">compiles DAG →</text>
    <text x="95" y="110" text-anchor="middle" fill="#475569">pipeline.yaml (IR)</text>

    <rect x="205" y="55" width="150" height="60" rx="6" fill="#f1f5f9" stroke="#64748b"/>
    <text x="280" y="80" text-anchor="middle" font-weight="bold" fill="#0f172a">ml-pipeline</text>
    <text x="280" y="98" text-anchor="middle" fill="#475569">API server records run</text>
    <text x="280" y="110" text-anchor="middle" fill="#475569">in MySQL</text>

    <rect x="390" y="55" width="150" height="60" rx="6" fill="#f1f5f9" stroke="#64748b"/>
    <text x="465" y="80" text-anchor="middle" font-weight="bold" fill="#0f172a">Argo Workflow CRD</text>
    <text x="465" y="98" text-anchor="middle" fill="#475569">created from the</text>
    <text x="465" y="110" text-anchor="middle" fill="#475569">IR YAML</text>

    <rect x="575" y="55" width="165" height="60" rx="6" fill="#f1f5f9" stroke="#64748b"/>
    <text x="657" y="80" text-anchor="middle" font-weight="bold" fill="#0f172a">workflow-controller</text>
    <text x="657" y="98" text-anchor="middle" fill="#475569">reconciles CRD,</text>
    <text x="657" y="110" text-anchor="middle" fill="#475569">schedules pods</text>
  </g>

  <line x1="170" y1="85" x2="200" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="355" y1="85" x2="385" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="540" y1="85" x2="570" y2="85" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <line x1="657" y1="115" x2="657" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="380" y="170" text-anchor="middle" font-size="12" fill="#334155" font-weight="bold">…per pipeline step:</text>

  <g font-size="11">
    <rect x="60" y="190" width="190" height="55" rx="6" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="155" y="212" text-anchor="middle" fill="#1e1b4b" font-weight="bold">system-dag-driver</text>
    <text x="155" y="228" text-anchor="middle" fill="#3730a3">opens MLMD execution</text>
    <text x="155" y="240" text-anchor="middle" fill="#3730a3">context for the run</text>

    <rect x="290" y="190" width="190" height="55" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="385" y="212" text-anchor="middle" fill="#064e3b" font-weight="bold">system-container-driver</text>
    <text x="385" y="228" text-anchor="middle" fill="#065f46">checks cache → skip</text>
    <text x="385" y="240" text-anchor="middle" fill="#065f46">on hit, else build input</text>

    <rect x="520" y="190" width="190" height="55" rx="6" fill="#fff7ed" stroke="#ea580c"/>
    <text x="615" y="212" text-anchor="middle" fill="#7c2d12" font-weight="bold">system-container-impl</text>
    <text x="615" y="228" text-anchor="middle" fill="#9a3412">runs your actual</text>
    <text x="615" y="240" text-anchor="middle" fill="#9a3412">component code</text>
  </g>

  <line x1="250" y1="217" x2="285" y2="217" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="480" y1="217" x2="515" y2="217" stroke="#475569" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="380" y="275" text-anchor="middle" font-size="11" fill="#64748b">Results, metrics, and lineage land in ML Metadata (MLMD) — this is what powers</text>
  <text x="380" y="291" text-anchor="middle" font-size="11" fill="#64748b">task-level caching on the next run, and what the UI's run graph reads from</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
